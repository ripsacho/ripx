# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# Local/dev Shopify CLI config.
# IMPORTANT:
# - Keep this file pointed at your active dev tunnel/app, never the production app host.
# - `shopify app dev --config shopify.app.local.toml` can update these URLs automatically.
# - If the tunnel changes, update `application_url`, `redirect_urls`, and `app_proxy.url`
#   together so storefront script loads stay on the same environment.

client_id = "e7a7d74e7aaa14162e3951a559bda6c1"
name = "RipperX"
application_url = "https://pierce-investment-careers-pig.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/api/webhooks/products/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,read_content,read_delivery_customizations,read_discounts,read_online_store_pages,read_orders,read_payment_customizations,read_products,read_shipping,write_cart_transforms,write_delivery_customizations,write_discounts,write_payment_customizations,write_products,write_shipping"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://pierce-investment-careers-pig.trycloudflare.com/api/auth/callback" ]

[app_proxy]
url = "https://pierce-investment-careers-pig.trycloudflare.com/api/proxy/script.js"
subpath = "ripx"
prefix = "apps"

[pos]
embedded = true
