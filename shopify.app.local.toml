# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9ad954016142e0baa9973c085ab8f7db"
name = "RipperX"
application_url = "https://127.0.0.1/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/api/webhooks/products/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,read_content,read_delivery_customizations,read_discounts,read_online_store_pages,read_orders,read_payment_customizations,read_products,read_shipping,write_cart_transforms,write_delivery_customizations,write_discounts,write_payment_customizations,write_products,write_shipping"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]

[app_proxy]
url = "/api/proxy/script.js"
subpath = "ripx"
prefix = "apps"

[pos]
embedded = true
