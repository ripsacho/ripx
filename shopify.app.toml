# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# For each deployment: set application_url and auth.redirect_urls to your app's public URL (same as Partner Dashboard).
# SHOPIFY_API_KEY in .env must equal this client_id so OAuth uses this app's Partner Dashboard URLs. See docs/OAUTH_FIX.md.

client_id = "4f6689d8765892c7201a611f1f578bb6"
name = "RIPX"
application_url = "https://splitter.echologyx.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/api/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
# Must match Application URL host; use https://<your-app-host>/api/auth/callback for your deployment
redirect_urls = [ "https://splitter.echologyx.com/api/auth/callback" ]
