query RipxCartLinesFetch {
  cart {
    shopAttr: attribute(key: "_ripx_shop") {
      value
    }
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
          currencyCode
        }
        compareAtAmountPerQuantity {
          amount
          currencyCode
        }
      }
      ripxShop: attribute(key: "_ripx_shop") {
        value
      }
      ripxTest: attribute(key: "_ripx_price_test") {
        value
      }
      ripxVariant: attribute(key: "_ripx_variant") {
        value
      }
      ripxPriceMethod: attribute(key: "_ripx_price_method") {
        value
      }
      ripxPriceApplicationMethod: attribute(key: "_ripx_price_application_method") {
        value
      }
      ripxPriceApplicationMethodLegacy: attribute(key: "__ripx_price_application_method") {
        value
      }
      ripxAssignmentSig: attribute(key: "_ripx_assignment_sig") {
        value
      }
      ripxAssignmentTs: attribute(key: "_ripx_assignment_ts") {
        value
      }
      ripxAssignmentUser: attribute(key: "_ripx_assignment_user") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
}
