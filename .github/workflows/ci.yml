name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: ripx
          POSTGRES_PASSWORD: ripx
          POSTGRES_DB: ripx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ripx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://ripx:ripx@localhost:5432/ripx_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret
      SHOPIFY_API_KEY: ci-shopify-key
      SHOPIFY_API_SECRET: ci-shopify-secret
      APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            extensions/ripx-checkout-discount/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install checkout extension dependencies
        run: npm --prefix extensions/ripx-checkout-discount ci

      - name: Run migrations
        run: npm run migrate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
